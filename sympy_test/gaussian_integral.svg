<title id="MathJax-SVG-1-Title">{\displaystyle {\begin{aligned}\iint _{\mathbb {R} ^{2}}e^{-\left(x^{2}+y^{2}\right)}dx\,dy&amp;=\int _{0}^{2\pi }\int _{0}^{\infty }e^{-r^{2}}r\,dr\,d\theta \\[6pt]&amp;=2\pi \int _{0}^{\infty }re^{-r^{2}}\,dr\\[6pt]&amp;=2\pi \int _{-\infty }^{0}{\tfrac {1}{2}}e^{s}\,ds&amp;&amp;s=-r^{2}\\[6pt]&amp;=\pi \int _{-\infty }^{0}e^{s}\,ds\\[6pt]&amp;=\pi \left(e^{0}-e^{-\infty }\right)\\[6pt]&amp;=\pi ,\end{aligned}}}</title>
